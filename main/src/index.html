<!doctype html>
<html>
  <head>
    <title>Resulum Launcher</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js"></script>
  </head>
  <body scroll="no" style="overflow: hidden" background="http://localhost:8080/background.png">
    <div class="debug-animated settings">
      <br>
      <p>Сколько памяти (в ГБ) может потреблять Minecraft?<text id="ram_value"> - 2</text></p>
      <div class="slidecontainer">
        <input type="range" min="4" max="12" value="2" class="slider-color" id="ram_usage">
      </div>
    </div>

    <div class="workstation">
      <div class="row workstation">
        <div class="column text-news">
          <div class="content-container">
          <a class="twitter-timeline" data-lang="ru" data-width="565" data-height="400" href="https://twitter.com/yuompioka?ref_src=twsrc%5Etfw">Tweets by yuocoltd</a> <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
          </div>
        </div>
        <div class="column debug-animated main-station">
          <div class="row console-container">
            <div class="row console">
              <text id="console_log">[Строка уведомлений]</text>
            </div>
          </div>
          <div class="row">
            <div class="card3d img-animated"><img src="http://localhost:8080/poster_1.png" alt="Image server down" width="120"></div>
            <div class="card3d img-animated"><img src="http://localhost:8080/poster_2.png" alt="Image server down" width="120"></div>
            <div class="card3d img-animated"><img src="http://localhost:8080/poster_3.png" alt="Image server down" width="120"></div>
            <div class="card3d img-animated"><img src="http://localhost:8080/poster_4.png" alt="Image server down" width="120"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="login-form">
      <div class="row login-form">
        <div class="column debug-animated input-service"><p>Никнейм</p>
          <input type="text" id="nickname_placeholder" name="nickname" value="">
        </div>
        <div class="column debug-animated input-service"><p>Пароль</p>
          <input type="password" id="password_placeholder" name="password" value="">
        </div>
        <div class="column">
          <button class="pushable" id="launch-button">
            <span class="front" id="front">
              <p>ЗАПУСК</p>
              <p id="version">(Также обновляет и проверяет сброрку)</p>
            </span>
          </button>
        </div>
        </div>
  </body>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.9-1/core.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.9-1/md5.js"></script>

  <script src="script.js"></script>
  <script src="auth.js"></script>
  <script src="core.js"></script>
  <script src="file-utils.js"></script>
</html>
