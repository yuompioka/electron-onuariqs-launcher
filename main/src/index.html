<!doctype html>
<html>
  <head>
    <title>Лаунчер Onuariqs™</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js"></script>
  </head>
  <body scroll="no" style="overflow: hidden" background="http://yuoco.myogaya.jp:8080/background.png">

    <div class="mods-container">
      <div class="mods" id="1">
        <img id="expand-button" src="http://yuoco.myogaya.jp:8080/expand.svg">
        <div class="mod-option">
          <div class="mod-info">
            <p id="debug_text2">Replaymod</p><p id="version3">[no info]</p>
          </div>
          <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
        <div class="mod-option">
          <div class="mod-info">
            <p id="debug_text2">Xaero's minimap & worldmap</p><p id="version3">[no info]</p>
          </div>
          <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
        <div class="mod-option">
          <div class="mod-info">
            <p id="debug_text2">Schematica</p><p id="version3">[no info]</p>
          </div>
          <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
        <div class="mod-option">
          <div class="mod-info">
            <p id="debug_text2">ID0</p><p id="version3">[no info]</p>
          </div>
          <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="debug-animated settings" id="ram_text">
      <br>
      <p>Сколько памяти (в ГБ) может потреблять Minecraft?<text id="ram_value"> - 2</text></p>
      <div class="slidecontainer">
        <input type="range" min="2" max="12" value="2" class="slider-color" id="ram_usage">
      </div>
    </div>

    <div class="workstation">
      <div class="row workstation">
        <div class="skin-changer">
          <div class="skincard">
            <p id="debug_text">Выберите изображение формата<br>PNG формата 64х64px</p>
            <div class="skin-iframe-container">
            <iframe class="skin_viewer" id="SkinViewer" src="http://yuoco.myogaya.jp:8080/skin-viewer/index.html"></iframe>
            <img src="http://yuoco.myogaya.jp:8080/settings.svg" style="margin-right: 9px;" class="rotate-icon">
            </div>
            <p id="version2">v1.1</p>
          </div>
        </div>
        <div class="column text-news">
          <div class="content-container">
          <!--<a class="twitter-timeline" data-lang="ru" data-width="280" data-height="200" href="https://twitter.com/yuompioka?ref_src=twsrc%5Etfw">Tweets by yuocoltd</a> <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
          -->
          <iframe class="newsBlock" src="http://yuoco.myogaya.jp:8080/news.html"></iframe>
          </div>
          <div class="mods-choose">
            <button class="round-button pushable" id="mods-choose-button">
              <span class="front-round front" id="choose">
                <img src="http://yuoco.myogaya.jp:8080/choose.svg">
              </span>
            </button>
          </div>
        </div>
        <div class="column debug-animated main-station">
          <div class="row">
            <div class="card3d img-animated"><img src="http://yuoco.myogaya.jp:8080/poster_1.png" alt="Image server down" width="120"></div>
            <div class="card3d img-animated"><img src="http://yuoco.myogaya.jp:8080/poster_2.png" alt="Image server down" width="120"></div>
            <div class="card3d img-animated"><img src="http://yuoco.myogaya.jp:8080/poster_3.png" alt="Image server down" width="120"></div>
            <div class="card3d img-animated"><img src="http://yuoco.myogaya.jp:8080/poster_4.png" alt="Image server down" width="120"></div>
          </div>
          <div class="row console-container">
            <div class="console">
              <text id="console_log">[Строка уведомлений]</text>
            </div>
            <div class="progress">
              <div class="container_0">
                <p style="margin-right: 5px;" id="progress_bar_text" class="white-text">0%</p>
                <p id="remaining" class="white-text">0 KB/s</p>
              </div>
              <progress id="progress_bar" value="0"></progress>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="login-form">
      <div class="row login-form">
        <div class="column debug-animated input-service"><p class="white-text">Никнейм</p>
          <input type="text" id="nickname_placeholder" name="nickname" value="">
        </div>
        <div class="column debug-animated input-service"><p class="white-text">Пароль</p>
          <input type="password" id="password_placeholder" name="password" value="">
        </div>
        <div class="column flex-column">
          <button class="round-button pushable" id="delete-button">
            <span class="front-round front" id="delete">
              <img src="http://yuoco.myogaya.jp:8080/delete.svg">
            </span>
          </button>
          <button class="round-button pushable" id="open-folder-button">
            <span class="front-round front" id="front">
              <img src="http://yuoco.myogaya.jp:8080/media.svg">
            </span>
          </button>
          <button class="pushable" id="launch-button">
            <span class="front" id="front">
              <p>ЗАПУСК</p>
              <p id="version">(Также обновляет и проверяет сборку)</p>
            </span>
          </button>
        </div>
        </div>

        <script src="https://unpkg.com/@popperjs/core@2"></script>
        <script src="https://unpkg.com/tippy.js@6"></script>
        <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale.css" />

        <script>
          tippy('#mods-choose-button', {
            animation: 'scale',
            arrow: false,
            content: 'Настроить моды',
          });
          tippy('#delete-button', {
            animation: 'scale',
            arrow: false,
            content: 'Удалить игру?',
          });
          tippy('#launch-button', {
            animation: 'scale',
            content: 'Не забыли ввести никнейм и пароль?',
            arrow: false,
          });
          tippy('#open-folder-button', {
            animation: 'scale',
            content: 'Открыть папку с скриншотами',
            arrow: false,
          });
          tippy(document.getElementById("nickname_placeholder"), {
            animation: 'scale',
            content: '<text style="text-align: center;">От 3 до 16 символов</text>',
            allowHTML: true,
            arrow: false,
          });
        </script>

  </body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.9-1/core.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.9-1/md5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r79/three.min.js"></script>

  <!--<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>-->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.3.10/dist/sweetalert2.all.min.js"></script>

  <script src="script.js"></script>
  <script src="jsonHandler.js"></script>
  <script src="auth.js"></script>
  <script src="renderer.js"></script>
  <script src="core.js"></script>
  <script>
    let user_ip;
    function getIP(json) {
      //alert("My public IP address is: " + json.ip);
      user_ip = json.ip;
      Swal.fire({
        title: "Проверка",
        text: `Ваш внешний IP-адрес: ${user_ip}`,
        icon: "info",
        showConfirmButton: false,
      });
    }
    </script>
    <script src="https://api.ipify.org?format=jsonp&callback=getIP"></script>
  <!--<script src="file-utils.js"></script>-->
</html>
